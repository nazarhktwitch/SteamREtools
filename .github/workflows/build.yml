name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject Hubcap key from secret
        shell: pwsh
        run: |
          (Get-Content launcher.py).Replace('HUBCAP_KEY_PLACEHOLDER', '${{ secrets.HUBCAP_KEY }}') | Set-Content launcher.py

      - name: Build EXE
        run: python -m PyInstaller SteamREtools.spec

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $prev = git describe --tags --abbrev=0 2>$null
          if ($prev) { $range = "$prev..HEAD" } else { $range = "HEAD" }
          $log = git log $range --oneline --no-decorate
          if (-not $log) { $log = "Initial release" }
          "changelog<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $log | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamREtools-${{ github.ref_name }}-windows-${{ matrix.arch }}
          path: dist/SteamREtools.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SteamREtools.exe
          body: |
            ## SteamREtools ${{ github.ref_name }}

            ### Changes
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
          generate_release_notes: false
